version: "3.8"
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - ./data/zookeeper-data:/var/lib/zookeeper/data
      - ./data/zookeeper-log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PROTOCOL_LOCAL://0.0.0.0:9092,PROTOCOL_DOCKER://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PROTOCOL_LOCAL://localhost:9092,PROTOCOL_DOCKER://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PROTOCOL_LOCAL:PLAINTEXT,PROTOCOL_DOCKER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PROTOCOL_DOCKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    volumes:
      - ./data/kafka-data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  spark-submit:
    image: bde2020/spark-master:3.3.0-hadoop3.3
    container_name: spark-submit
    depends_on:
      - kafka
      - postgres-db
    environment:
      - TZ=Asia/Jakarta
    volumes:
      - ./processing-layer/spark-speed-layer:/opt/spark-apps
    entrypoint: [
        "/bin/bash",
        "-c",
        "sleep 15 && /spark/bin/spark-submit \
        --master local[*] \
        --driver-memory 2g \
        --conf \"spark.driver.extraJavaOptions=-Duser.timezone=Asia/Jakarta\" \
        --conf \"spark.executor.extraJavaOptions=-Duser.timezone=Asia/Jakarta\" \
        --jars /opt/spark-apps/jars/postgresql-42.7.3.jar,/opt/spark-apps/jars/spark-sql-kafka-0-10_2.12-3.3.0.jar,/opt/spark-apps/jars/kafka-clients-3.3.1.jar,/opt/spark-apps/jars/spark-token-provider-kafka-0-10_2.12-3.3.0.jar,/opt/spark-apps/jars/commons-pool2-2.11.1.jar \
        /opt/spark-apps/traffic_etl.py",
      ]
    restart: on-failure

  postgres-db:
    image: postgres:15-alpine
    container_name: postgree-db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=traffic_db
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  airflow:
    image: apache/airflow:2.7.1
    container_name: airflow-server
    depends_on:
      - postgres-db
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql://admin:password123@postgres-db:5432/traffic_db
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__FERNET_KEY: DfgssvYqydkhsLxsevTaDjBxXbEli9ZlJAtbx_F4doI=
      AIRFLOW__WEBSERVER__SECRET_KEY: secretkey123
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./processing-layer/airflow-historical-layer/dags:/opt/airflow/dags
      - ./processing-layer/airflow-historical-layer/logs:/opt/airflow/logs
      - ./processing-layer/airflow-historical-layer/plugins:/opt/airflow/plugins
      - ./processing-layer/airflow-historical-layer/requirements.txt:/requirements.txt
    ports:
      - "8082:8080"
    command: >
      bash -c "
      pip install -r /requirements.txt &&
      airflow db init &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com &&
      airflow webserver &
      airflow scheduler"
volumes:
  kafka-data:
  zookeeper-data:
  zookeeper-log:
